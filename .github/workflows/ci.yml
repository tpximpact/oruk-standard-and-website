name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, staging]
  push:
    # there is no need to run this workflow on push to staging as it will be triggered by the PR workflow, but we do want it to run on push to main for direct commits and merges
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

permissions:
  contents: read
  packages: write # Required for GHCR push
  security-events: write # Required for Trivy/CodeQL SARIF upload

jobs:
  # --- JOB 0: BRANCH GATE ---
  # Ensures that PRs to 'main' ONLY come from 'staging'
  branch-gate:
    name: Validate PR Source
    runs-on: ubuntu-latest
    # Only run this logic if it's a Pull Request
    if: github.event_name == 'pull_request'
    steps:
      - name: Check Branch Flow
        run: |
          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" != "staging" ]]; then
            echo "::error::Illegal Merge: PRs to 'main' must originate from 'staging'."
            exit 1
          fi
          echo "Branch flow validated."

  # --- 2. BUILD, TEST & QUALITY ---
  build-and-test:
    name: Build, Test & Coverage
    needs: branch-gate
    # This 'if' allows the job to run if branch-gate passed OR if it wasn't a PR (like a push)
    if: |
      always() && 
      (needs.branch-gate.result == 'success' || needs.branch-gate.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v5.0.3
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock') }}-

      - name: Lint & Type Check
        run: |
          yarn lint
          yarn tsc --noEmit

      - name: Build
        run: yarn build

      - name: Run tests with coverage
        run: yarn test --coverage --passWithNoTests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          directory: ./coverage
          fail_ci_if_error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: test-results
          path: ./coverage
          if-no-files-found: warn
          retention-days: 14

  # --- JOB 3: PARALLEL SCANS (Matrix) ---
  parallel-checks:
    name: ${{ matrix.check }} Scan
    needs: build-and-test
    if: always() && needs.build-and-test.result == 'success'
    permissions:
      security-events: write
      actions: read
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [trivy-fs, playwright-a11y, codeql] # We can add more checks here in the future
    steps:
      - uses: actions/checkout@v6.0.2

      # --- CODEQL LOGIC ---
      - name: Initialize CodeQL
        if: matrix.check == 'codeql'
        uses: github/codeql-action/init@v4.32.6
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL Analysis
        if: matrix.check == 'codeql'
        uses: github/codeql-action/analyze@v4.32.6

      # Playwright Logic
      - name: Cache Playwright Browsers
        if: matrix.check == 'playwright-a11y'
        uses: actions/cache@v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Playwright A11y
        if: matrix.check == 'playwright-a11y'
        run: |
          yarn install --frozen-lockfile
          npx playwright install --with-deps chromium
          yarn e2e src/e2e/accessibility.spec.ts
        env:
          CI: true

      - name: Upload Playwright Reports
        if: always() && matrix.check == 'playwright-a11y'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: accessibility-reports
          path: |
            accessibility-report/
            playwright-report/
          retention-days: 14

      # Trivy FS Logic
      - name: Cache Trivy DB
        if: matrix.check == 'trivy-fs'
        uses: actions/cache@v5.0.4
        with:
          path: .trivycache
          key: trivy-db-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Trivy FS Scan
        if: matrix.check == 'trivy-fs'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Do not break the build here; let the Gatekeeper handle it
          cache-dir: .trivycache

      - name: Upload Trivy FS results
        if: always() && matrix.check == 'trivy-fs'
        uses: github/codeql-action/upload-sarif@v4.32.6
        with:
          sarif_file: trivy-fs-results.sarif

  docker-and-dast:
    name: Docker & ZAP Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build Local Image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          load: true # Loads into local Docker instead of pushing to Registry
          tags: my-app:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 1. Cache the Trivy DB so the Image Scan is fast
      - name: Cache Trivy DB
        uses: actions/cache@v5.0.4
        with:
          path: .trivycache # Change from ~/.cache/trivy to .trivycache
          key: trivy-db-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'my-app:local'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          cache-dir: .trivycache

      - name: Upload Trivy Image SARIF
        uses: github/codeql-action/upload-sarif@v4.32.6
        if: always() && hashFiles('trivy-image-results.sarif') != ''
        with:
          sarif_file: trivy-image-results.sarif

      # --- START APP FOR SCANNING ---
      - name: Run App for Zap
        run: |
          docker run -d --name test-app -p 3000:3000 my-app:local

      - name: Wait for app Readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          echo "App failed readiness check"
          docker logs test-app || true
          exit 1

      # ---  ZAP ACTION ---
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: 'zap-security-report'
          allow_issue_writing: true
          cmd_options: '-a'

      - name: Stop App
        if: always()
        run: docker stop test-app && docker rm test-app

  # --- JOB 4: FINAL STATUS CHECK (The Gatekeeper) ---
  # This job is what you should use for your Branch Protection Rules.
  # It only runs if all preceding parallel jobs succeed.
  workflow-status:
    name: Final Workflow Status
    needs: [parallel-checks, docker-and-dast]
    runs-on: ubuntu-latest
    if: always() # Ensures this runs even if others are skipped or fail so we can evaluate them
    steps:
      - name: Check All Jobs Status
        run: |
          # 1. Get the results
          SEC_RESULT="${{ needs.parallel-checks.result }}"
          DOCKER_RESULT="${{ needs.docker-and-dast.result }}"

          echo "Security Scan Status: $SEC_RESULT"
          echo "Docker & DAST Status: $DOCKER_RESULT"

          # 2. Strict Check: If ANY job actually failed or was cancelled, we fail.
          if [[ "$SEC_RESULT" == "failure" || "$SEC_RESULT" == "cancelled" ]] || \
             [[ "$DOCKER_RESULT" == "failure" || "$DOCKER_RESULT" == "cancelled" ]]; then
            echo "::error::One or more required jobs failed or were cancelled."
            exit 1
          fi

          # 3. Logic Check: If they are both 'skipped', it might mean the build failed earlier.
          # (Optional: You can add a check here for the build-and-test result if you want to be extra safe)

          echo "All checks passed!"

  # --- JOB 5: RELEASE ---
  create-release:
    name: Create GitHub Release
    # Waits for both parallel security and docker paths to complete
    needs: workflow-status
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.workflow-status.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create the release
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
